name: CI

# Run on every push and pull request to main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      # ─── Setup ───────────────────────────────────────────────────────────────

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      # Cache node_modules — skips install if lockfile unchanged.
      # This saves 60-90 seconds on most CI runs.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Type checking ────────────────────────────────────────────────────────

      - name: Build types package
        run: cd packages/types && pnpm exec tsc

      - name: Type check API
        run: cd apps/api && pnpm exec tsc --noEmit

      # ─── Tests ───────────────────────────────────────────────────────────────

      - name: Run all tests
        run: pnpm test
        env:
          # Test environment variables — safe placeholders
          NODE_ENV: test
          PORT: 4001
          MONGODB_URI: mongodb://localhost:27017/chatbot-test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          JWT_SECRET: test-secret-minimum-32-characters-long!!
          MARKETO_BASE_URL: https://test.mktorest.com
          MARKETO_CLIENT_ID: test-client-id
          MARKETO_CLIENT_SECRET: test-client-secret
          PINECONE_API_KEY: test-pinecone-key
          PINECONE_INDEX: test-index
          FRONTEND_URL: http://localhost:3000

      # ─── Coverage ─────────────────────────────────────────────────────────────

      - name: Generate coverage report
        run: pnpm test:coverage
        env:
          NODE_ENV: test
          PORT: 4001
          MONGODB_URI: mongodb://localhost:27017/chatbot-test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          JWT_SECRET: test-secret-minimum-32-characters-long!!
          MARKETO_BASE_URL: https://test.mktorest.com
          MARKETO_CLIENT_ID: test-client-id
          MARKETO_CLIENT_SECRET: test-client-secret
          PINECONE_API_KEY: test-pinecone-key
          PINECONE_INDEX: test-index
          FRONTEND_URL: http://localhost:3000

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Docker Build Verification ─────────────────────────────────────────────

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false # Just verify it builds — don't push
          tags: chatbot-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: chatbot-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
